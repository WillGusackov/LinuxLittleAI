name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Install puter.js (only if not in package.json)
      - name: Install puter.js
        run: npm install @heyputer/puter.js

      - run: npm test

      - name: Create desktop shortcut
        run: |
          mkdir -p $HOME/Desktop
          echo "[Desktop Entry]" > $HOME/Desktop/RunMyApp.desktop
          echo "Version=1.0" >> $HOME/Desktop/RunMyApp.desktop
          echo "Name=MyApp" >> $HOME/Desktop/RunMyApp.desktop
          echo "Exec=node /path/to/myai.js" >> $HOME/Desktop/RunMyApp.desktop
          echo "Terminal=false" >> $HOME/Desktop/RunMyApp.desktop
          chmod +x $HOME/Desktop/RunMyApp.desktop

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - name: Install puter.js
        run: npm install @heyputer/puter.js

      - run: npm publish
